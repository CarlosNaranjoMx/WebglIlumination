<!DOCTYPE html>
<html>
<head></head>
<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r71/three.min.js"></script>
<script src="javascript/loaders/PLYLoader.js"></script>

<style>
#panel {
  position: fixed; top: 1.5rem; left: 1.5rem;
  background: rgba(13,15,20,0.85);
  border: 1px solid rgba(100,255,218,0.15);
  border-radius: 14px; padding: 1rem 1.25rem;
  backdrop-filter: blur(10px);
  font-family: 'Segoe UI', system-ui, sans-serif;
  min-width: 160px; display: flex; flex-direction: column; gap: 0.75rem; z-index: 100;
}
.panel-section { display: flex; flex-direction: column; gap: 0.4rem; }
.panel-label { font-size: 0.65rem; letter-spacing: 0.12em; text-transform: uppercase; color: #64ffda; margin-bottom: 0.1rem; }
.key-row { display: flex; align-items: center; gap: 0.4rem; font-size: 0.75rem; color: #94a3b8; }
kbd { display: inline-flex; align-items: center; justify-content: center; background: #1e2a3a; border: 1px solid #2d3f52; border-bottom: 2px solid #2d3f52; border-radius: 4px; padding: 0.1rem 0.45rem; font-size: 0.72rem; font-family: monospace; color: #e2e8f0; min-width: 1.4rem; }
.slider-row { display: flex; flex-direction: column; gap: 0.3rem; }
.slider-row label { font-size: 0.75rem; color: #94a3b8; }
.slider-row input[type=range] { width: 100%; accent-color: #64ffda; cursor: pointer; }
.divider { height: 1px; background: rgba(100,255,218,0.08); }
#btn-home { display: flex; align-items: center; gap: 0.4rem; background: none; border: 1px solid rgba(100,255,218,0.2); border-radius: 8px; padding: 0.4rem 0.6rem; color: #64ffda; font-size: 0.72rem; font-family: 'Segoe UI', system-ui, sans-serif; cursor: pointer; text-decoration: none; transition: background 0.15s; }
#btn-home:hover { background: rgba(100,255,218,0.1); }
#rot-controls { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%); display: flex; gap: 0.75rem; align-items: center; background: rgba(13,15,20,0.75); border: 1px solid rgba(100,255,218,0.15); border-radius: 999px; padding: 0.5rem 1.25rem; backdrop-filter: blur(8px); z-index: 100; }
#rot-controls button { background: none; border: none; cursor: pointer; padding: 0.35rem; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: background 0.15s; }
#rot-controls button:hover { background: rgba(100,255,218,0.12); }
#rot-controls button svg { display: block; }
#deg-counter { font-size: 0.78rem; font-family: monospace; color: #64ffda; min-width: 4.5ch; text-align: center; }
</style>

<div id="panel">
  <a href="./index.html" id="btn-home">
    <svg width="13" height="13" viewBox="0 0 16 16" fill="none">
      <path d="M1 6.5L8 1l7 5.5V15H10v-4H6v4H1V6.5Z" stroke="#64ffda" stroke-width="1.4" stroke-linejoin="round" fill="none"/>
    </svg>
    Inicio
  </a>
  <div class="divider"></div>
  <div class="panel-section">
    <div class="panel-label">Controles</div>
    <div class="key-row"><kbd>p</kbd> pausar</div>
    <div class="key-row"><kbd>y</kbd><kbd>Y</kbd> rotar</div>
    <div class="key-row"><kbd>f</kbd><kbd>F</kbd> z far</div>
  </div>
  <div class="divider"></div>
  <div class="panel-section">
    <div class="panel-label">Profundidad</div>
    <div class="slider-row"><label>Z far</label><input type="range" id="z_far" min="0" max="20" value="20"></div>
  </div>
</div>

<script id="fragment_shader" type="x-shader/x-fragment">
varying vec3 vpos; uniform float z_far;
void main(void) {
  float len=sqrt(pow(vpos.x,2.0)+pow(vpos.y,2.0)+pow(vpos.z,2.0));
  gl_FragColor=vec4(len/z_far,len/z_far,len/z_far,1.0);
}
</script>
<script id="vertex_shader" type="x-shader/x-vertex">
varying vec3 LightDir[2]; varying vec3 vnormal; varying vec3 vpos; varying mat4 mvMatrix;
void main() {
  mvMatrix=modelViewMatrix; vnormal=normalize(normalMatrix*normal);
  vpos=vec3(modelViewMatrix*vec4(position,1.0));
  gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);
}
</script>

<script>
  var container,camera,cameraTarget,scene,renderer,mesh,material,uniforms;
  var clock=new THREE.Clock();
  var rotationSpeed=0,camaraSpeed=0,z_position_speed=0;
  var totalDeg=0;
  var geometry;

  var loader=new THREE.PLYLoader();
  loader.addEventListener('load',function(event){
    geometry=event.content;
    material=new THREE.ShaderMaterial({uniforms:uniforms, vertexShader:document.getElementById('vertex_shader').textContent, fragmentShader:document.getElementById('fragment_shader').textContent});
    geometry.computeFaceNormals(); geometry.computeVertexNormals();
    mesh=new THREE.Mesh(geometry,material);
    mesh.position.set(0,0,0); mesh.rotation.set(-2,-0.4,1); mesh.scale.set(0.01,0.01,0.01);
    scene.add(mesh); animate();
  });
  window.addEventListener('resize',onWindowResize,false);
  window.addEventListener('keydown',function(event){
    switch(event.key){
      case 'p': case 'P': rotationSpeed=0; camaraSpeed=0; z_position_speed=0; break;
      case 'y': rotationSpeed+=0.1; break; case 'Y': rotationSpeed-=0.1; break;
      case 'c': camaraSpeed+=0.1; break; case 'C': camaraSpeed-=0.1; break;
      case 'z': z_position_speed+=0.1; break; case 'Z': z_position_speed-=0.1; break;
      case 'f': uniforms.z_far.value+=1; break; case 'F': uniforms.z_far.value-=1; break;
    }
  });
  draw_scene();
  function draw_scene(){
    container=document.createElement('div'); document.body.appendChild(container);
    camera=new THREE.PerspectiveCamera(35,window.innerWidth/window.innerHeight,1,15);
    camera.position.set(3,1,3); cameraTarget=new THREE.Vector3(0,-0.25,0);
    scene=new THREE.Scene(); uniforms={z_far:{type:'f',value:20.0}};
    renderer=new THREE.WebGLRenderer(); renderer.setClearColor(0x8DA6F5);
    renderer.setSize(window.innerWidth,window.innerHeight); container.appendChild(renderer.domElement);
    document.getElementById('z_far').addEventListener('change',function(e){ uniforms.z_far.value=parseInt(e.target.value)+0.0; });
    loader.load('./modelos/Garuda and Vishnu.ply');
  }
  function onWindowResize(){ camera.aspect=window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth,window.innerHeight); }
  function animate(){ requestAnimationFrame(animate); render(); }
  function render(){
    var delta=clock.getDelta();
    mesh.rotation.y+=-delta*rotationSpeed;
    totalDeg+=Math.abs(delta*rotationSpeed)*180/Math.PI;
    document.getElementById('deg-counter').textContent=Math.round(totalDeg)+'°';
    camera.lookAt(cameraTarget); renderer.render(scene,camera);
  }
</script>

<div id="rot-controls">
  <button id="btn-left" title="Rotar izquierda">
    <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
      <circle cx="14" cy="14" r="13" stroke="#64ffda" stroke-width="1.2"/>
      <polyline points="16,9 10,14 16,19" stroke="#64ffda" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>
  <button id="btn-pause" title="Pausar / Reanudar">
    <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
      <circle cx="14" cy="14" r="13" stroke="#64ffda" stroke-width="1.2"/>
      <rect x="10" y="9" width="3" height="10" rx="1" fill="#64ffda"/>
      <rect x="15" y="9" width="3" height="10" rx="1" fill="#64ffda"/>
    </svg>
  </button>
  <span id="deg-counter">0°</span>
  <button id="btn-right" title="Rotar derecha">
    <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
      <circle cx="14" cy="14" r="13" stroke="#64ffda" stroke-width="1.2"/>
      <polyline points="12,9 18,14 12,19" stroke="#64ffda" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>
</div>

<script>
(function(){
  var paused=false,savedSpeed=0,STEP=0.5;
  document.getElementById('btn-left').addEventListener('click',function(){ rotationSpeed+=STEP; paused=false; });
  document.getElementById('btn-right').addEventListener('click',function(){ rotationSpeed-=STEP; paused=false; });
  document.getElementById('btn-pause').addEventListener('click',function(){
    if(!paused){ savedSpeed=rotationSpeed; rotationSpeed=0; paused=true; totalDeg=0; document.getElementById('deg-counter').textContent='0°';
      this.querySelector('svg').innerHTML='<circle cx="14" cy="14" r="13" stroke="#64ffda" stroke-width="1.2"/><polygon points="10,8 20,14 10,20" fill="#64ffda"/>';
    } else { rotationSpeed=savedSpeed||STEP; paused=false;
      this.querySelector('svg').innerHTML='<circle cx="14" cy="14" r="13" stroke="#64ffda" stroke-width="1.2"/><rect x="10" y="9" width="3" height="10" rx="1" fill="#64ffda"/><rect x="15" y="9" width="3" height="10" rx="1" fill="#64ffda"/>';
    }
  });
}());
</script>

</body>
</html>
