<!DOCTYPE html>
<html>
	<head></head>
	<body>

	<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r71/three.min.js"></script>
	<script src="javascript/loaders/PLYLoader.js"></script>

<style>
#panel {
  position: fixed;
  top: 1.5rem;
  left: 1.5rem;
  background: rgba(13,15,20,0.82);
  border: 1px solid rgba(100,255,218,0.15);
  border-radius: 14px;
  padding: 1rem 1.25rem;
  backdrop-filter: blur(10px);
  font-family: 'Segoe UI', system-ui, sans-serif;
  min-width: 160px;
  display: flex;
  flex-direction: column;
  gap: 0.75rem;
}
.panel-section {
  display: flex;
  flex-direction: column;
  gap: 0.4rem;
}
.panel-label {
  font-size: 0.65rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: #64ffda;
  margin-bottom: 0.1rem;
}
.key-row {
  display: flex;
  align-items: center;
  gap: 0.4rem;
  font-size: 0.75rem;
  color: #94a3b8;
}
kbd {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  background: #1e2a3a;
  border: 1px solid #2d3f52;
  border-bottom: 2px solid #2d3f52;
  border-radius: 4px;
  padding: 0.1rem 0.45rem;
  font-size: 0.72rem;
  font-family: monospace;
  color: #e2e8f0;
  min-width: 1.4rem;
  text-align: center;
}
.color-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 0.5rem;
  font-size: 0.75rem;
  color: #94a3b8;
}
.color-row input[type=color] {
  width: 2rem;
  height: 1.5rem;
  border: 1px solid #2d3f52;
  border-radius: 4px;
  background: none;
  cursor: pointer;
  padding: 1px 2px;
}
.divider {
  height: 1px;
  background: rgba(100,255,218,0.08);
}
</style>

<div id="panel">
  <div class="panel-section">
    <div class="panel-label">Controles</div>
    <div class="key-row"><kbd>p</kbd> pausar</div>
    <div class="key-row"><kbd>y</kbd><kbd>Y</kbd> rotar</div>
  </div>
  <div class="divider"></div>
  <div class="panel-section">
    <div class="panel-label">Bandas de color</div>
    <div class="color-row">Banda 1 <input type="color" id="color01" value="#C20000"></div>
    <div class="color-row">Banda 2 <input type="color" id="color02" value="#ff0000"></div>
    <div class="color-row">Banda 3 <input type="color" id="color03" value="#ff0000"></div>
    <div class="color-row">Banda 4 <input type="color" id="color04" value="#ff0000"></div>
  </div>
</div>

<script id="fragment_shader" type="x-shader/x-fragment">
varying vec3 vnormal;
varying vec3 vpos;
varying mat4 mvMatrix;

uniform vec3 LightDirection1;
uniform vec3 diffuseColor;
uniform vec3 color01;
uniform vec3 color02;
uniform vec3 color03;
uniform vec3 color04;

void main()
{
	vec3 n = normalize(vnormal);
	vec4 diffuse = vec4(0.0);
	vec3 lightDir = normalize(-LightDirection1);
	float NdotL = dot(n, lightDir);
    float v1 = 0.0; float v2 = 0.25; float v3 = 0.5; float v4 = 0.75;
    if (NdotL > v4){ diffuse = vec4(color04,1.0); }
    else if (NdotL > v3){ diffuse = vec4(color03,1.0); }
    else if (NdotL > v2){ diffuse = vec4(color02,1.0); }
    else if (NdotL > v1){ diffuse = vec4(color01,1.0); }
	gl_FragColor = diffuse;
}
</script>

<script id="vertex_shader" type="x-shader/x-vertex">
varying vec3 vnormal;
varying vec3 vpos;
varying mat4 mvMatrix;
void main()
{
	mvMatrix = modelViewMatrix;
	vnormal = normalize(normalMatrix * normal);
	vpos = vec3(modelViewMatrix * vec4(position, 1.0));
	gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
}
</script>

<script>
			var container;
			var camera, cameraTarget, scene, renderer;
			var mesh;
			var material, uniforms;
			var clock = new THREE.Clock();
			var rotationSpeed = 0;
			var camaraSpeed = 0;
			var z_position_speed = 0;

				var loader = new THREE.PLYLoader();
				loader.addEventListener( 'load', function ( event ) {
					var geometry = event.content;
					material = new THREE.ShaderMaterial( {
						uniforms: uniforms,
						vertexShader: document.getElementById( 'vertex_shader' ).textContent,
						fragmentShader: document.getElementById( 'fragment_shader' ).textContent
					} );
					geometry.computeFaceNormals();
					geometry.computeVertexNormals();
					mesh = new THREE.Mesh( geometry, material );
					mesh.position.set( 0, -0.7, 0 );
					mesh.rotation.set( 0, - Math.PI / 2, 0 );
					mesh.scale.set( 7, 7, 7 );
					scene.add( mesh );
					animate();
				} );

			draw_scene();

			function draw_scene() {
				container = document.createElement( 'div' );
				document.body.appendChild( container );
				camera = new THREE.PerspectiveCamera( 35, window.innerWidth / window.innerHeight, 1, 15 );
				camera.position.set( 3, 1, 3 );
				cameraTarget = new THREE.Vector3( 0, -0.25, 0 );
				scene = new THREE.Scene();
				uniforms = {
					LightDirection1: { type: "v3", value: new THREE.Vector3(0,-1,-1) },
					diffuseColor: { type: "v3", value: new THREE.Vector3(1.00, 0.58, 0.25) },
					color01: { type: "v3", value: new THREE.Vector3(0.96, 0.98, 0.33) },
					color02: { type: "v3", value: new THREE.Vector3(1.00, 0.58, 0.25) },
					color03: { type: "v3", value: new THREE.Vector3(0.76, 0.00, 0.00) },
					color04: { type: "v3", value: new THREE.Vector3(0.25, 0.00, 0.00) }
				};
				loader.load( './modelos/dragon100k.ply' );
				scene.add( new THREE.AmbientLight( 0x777777 ) );
				renderer = new THREE.WebGLRenderer( );
				renderer.setClearColor( 0x72645b );
				renderer.setSize( window.innerWidth, window.innerHeight );
				container.appendChild( renderer.domElement );

				['color01','color02','color03','color04'].forEach(function(id) {
					document.getElementById(id).addEventListener("change", function(event) {
						var temp = [0,0,0];
						temp[0] = parseInt(event.target.value.substring(1,3),16);
						temp[1] = parseInt(event.target.value.substring(3,5),16);
						temp[2] = parseInt(event.target.value.substring(5,7),16);
						uniforms[id].value = new THREE.Vector3().fromArray(temp).divideScalar(255);
					});
				});

				window.addEventListener( 'resize', onWindowResize, false );
				window.addEventListener("keydown",function(event){
					switch (event.key) {
						case "p": case "P": rotationSpeed=0; camaraSpeed=0; z_position_speed=0; break;
						case "y": rotationSpeed += 0.1; break;
						case "Y": rotationSpeed -= 0.1; break;
						case "c": camaraSpeed += 0.1; break;
						case "C": camaraSpeed -= 0.1; break;
						case "z": z_position_speed += 0.1; break;
						case "Z": z_position_speed -= 0.1; break;
						default: break;
					}
				});
			}

			function onWindowResize() {
				camera.aspect = window.innerWidth / window.innerHeight;
				camera.updateProjectionMatrix();
				renderer.setSize( window.innerWidth, window.innerHeight );
			}
			function animate() { requestAnimationFrame( animate ); render(); }
			function render() {
				var delta = clock.getDelta();
				mesh.rotation.y += -delta * rotationSpeed;
				camera.lookAt( cameraTarget );
				renderer.render( scene, camera );
			}
		</script>

<style>
#rot-controls {
  position: fixed;
  bottom: 2rem;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 0.75rem;
  align-items: center;
  background: rgba(13,15,20,0.75);
  border: 1px solid rgba(100,255,218,0.15);
  border-radius: 999px;
  padding: 0.5rem 1.25rem;
  backdrop-filter: blur(8px);
}
#rot-controls button {
  background: none;
  border: none;
  cursor: pointer;
  padding: 0.35rem;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.15s;
}
#rot-controls button:hover { background: rgba(100,255,218,0.12); }
#rot-controls button svg { display: block; }
</style>

<div id="rot-controls">
  <button id="btn-left" title="Rotar izquierda">
    <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
      <circle cx="14" cy="14" r="13" stroke="#64ffda" stroke-width="1.2"/>
      <polyline points="16,9 10,14 16,19" stroke="#64ffda" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>
  <button id="btn-pause" title="Pausar / Reanudar">
    <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
      <circle cx="14" cy="14" r="13" stroke="#64ffda" stroke-width="1.2"/>
      <rect x="10" y="9" width="3" height="10" rx="1" fill="#64ffda"/>
      <rect x="15" y="9" width="3" height="10" rx="1" fill="#64ffda"/>
    </svg>
  </button>
  <button id="btn-right" title="Rotar derecha">
    <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
      <circle cx="14" cy="14" r="13" stroke="#64ffda" stroke-width="1.2"/>
      <polyline points="12,9 18,14 12,19" stroke="#64ffda" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>
</div>

<script>
(function(){
  var paused = false;
  var savedSpeed = 0;
  var STEP = 0.5;
  document.getElementById('btn-left').addEventListener('click', function(){ rotationSpeed += STEP; paused = false; });
  document.getElementById('btn-right').addEventListener('click', function(){ rotationSpeed -= STEP; paused = false; });
  document.getElementById('btn-pause').addEventListener('click', function(){
    if (!paused) {
      savedSpeed = rotationSpeed; rotationSpeed = 0; paused = true;
      this.querySelector('svg').innerHTML = '<circle cx="14" cy="14" r="13" stroke="#64ffda" stroke-width="1.2"/><polygon points="10,8 20,14 10,20" fill="#64ffda"/>';
    } else {
      rotationSpeed = savedSpeed || STEP; paused = false;
      this.querySelector('svg').innerHTML = '<circle cx="14" cy="14" r="13" stroke="#64ffda" stroke-width="1.2"/><rect x="10" y="9" width="3" height="10" rx="1" fill="#64ffda"/><rect x="15" y="9" width="3" height="10" rx="1" fill="#64ffda"/>';
    }
  });
}());
</script>

	</body>
</html>
